<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ✅ Correct favicon path -->
    <link rel="icon" href="%PUBLIC_URL%/cryptocurrency.png" />

    <!-- ✅ Mobile responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- ✅ Theme color -->
    <meta name="theme-color" content="#1677ff" />

    <!-- ✅ SEO description -->
    <meta
      name="description"
      content="Cryptoverse – Track cryptocurrency prices, market trends, exchanges, and latest crypto news in real time."
    />

    <!-- ✅ Keywords for SEO -->
    <meta
      name="keywords"
      content="cryptocurrency, bitcoin, ethereum, crypto prices, crypto news, blockchain"
    />

    <!-- ✅ Apple icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- ✅ PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ✅ Open Graph (Social sharing) -->
    <meta property="og:title" content="Cryptoverse" />
    <meta
      property="og:description"
      content="Real-time cryptocurrency prices, market statistics, and crypto news."
    />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter preview -->
    <meta name="twitter:card" content="summary_large_image" />

    <title>Cryptoverse | Crypto Prices & News</title>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <div id="root"></div>
  </body>
</html>
